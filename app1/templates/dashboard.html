<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #0f2027, #000000);
            color:white;
            min-height:100vh;
            padding:20px;
        }

        h2 {
            text-align:center;
            margin-bottom:20px;
            text-shadow:0 0 10px #00b5ad;
        }

        .top-bar {
            display:flex;
            justify-content:space-between;
            margin-bottom:20px;
        }

        .btn {
            padding:10px 15px;
            background:linear-gradient(45deg,#00b5ad,#00d4ff);
            border-radius:10px;
            text-decoration:none;
            color:white;
            box-shadow:0 5px 15px rgba(0,0,0,0.4);
            transition:0.3s;
        }

        .btn:hover {
            transform:translateY(-3px);
        }

        .grid {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(350px,1fr));
            gap:20px;
        }

        .card {
            background:rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding:20px;
            border-radius:15px;
            box-shadow:
                0 10px 30px rgba(0,0,0,0.5),
                inset 0 0 10px rgba(0,255,255,0.2);
            transition:0.3s;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
        }

        .card h3 {
            margin-bottom:10px;
            border-bottom:1px solid #00b5ad;
            padding-bottom:5px;
        }

        .log {
            padding:8px;
            margin:5px 0;
            background:rgba(255,255,255,0.05);
            border-radius:8px;
            font-size:13px;
            color:#ccc;
        }

        .alert {
            padding:10px;
            margin:5px 0;
            border-left:4px solid red;
            background:rgba(255,0,0,0.1);
            color:#ff4d4d;
            border-radius:5px;
        }

    </style>
</head>
<body>

<h2>👤 Welcome {{ user.email }}</h2>

<div class="top-bar">
    <a href="/logout/" class="btn">Logout</a>
    <a href="/admin-dashboard/" class="btn">Admin Panel</a>
</div>

<div class="grid">

    <!-- LOGS -->
    <div class="card">
        <h3>📊 Activity Logs</h3>
        {% for log in logs %}
        <div class="log">
            {{ log.action }} <br>
            IP: {{ log.ip_address }} <br>
            {{ log.created_at }}
        </div>
        {% empty %}
        <p>No activity yet</p>
        {% endfor %}
    </div>

    <!-- ALERTS -->
    <div class="card">
        <h3>🚨 Alerts</h3>
        {% for alert in alerts %}
        <div class="alert">
            {{ alert.message }}
        </div>
        {% empty %}
        <p>No alerts</p>
        {% endfor %}
    </div>

</div>

</body>
</html>

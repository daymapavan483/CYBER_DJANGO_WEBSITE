<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins'; }

        body {
            height:100vh;
            background: linear-gradient(135deg,#0f2027,#2c5364);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card {
            width:380px;
            padding:25px;
            border-radius:20px;
            background:rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            box-shadow:0 20px 40px rgba(0,0,0,0.5);
            transition:0.4s;
        }

        .card:hover {
            transform: rotateY(5deg) rotateX(5deg);
        }

        h2 { text-align:center; color:#fff; margin-bottom:15px; }

        .row {
            display:flex;
            gap:10px;
        }

        input {
            width:100%;
            padding:10px;
            margin:8px 0;
            border:none;
            border-radius:10px;
            background:rgba(255,255,255,0.2);
            color:#fff;
        }

        input::placeholder { color:#ddd; }

        button {
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:10px;
            background:linear-gradient(45deg,#00b5ad,#00d4ff);
            color:white;
            cursor:pointer;
        }

        .msg { color:red; text-align:center; margin-top:10px; }

        a { display:block; text-align:center; margin-top:10px; color:#00d4ff; }

    </style>
</head>
<body>

<div class="card">
    <h2>Create Account</h2>

    <form method="post">
        {% csrf_token %}

        <div class="row">
            <input type="text" name="first_name" placeholder="First Name" required>
            <input type="text" name="last_name" placeholder="Last Name" required>
        </div>

        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="contact_no" placeholder="Contact Number" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Register</button>
    </form>

    <p class="msg">{{ msg }}</p>

    <a href="/">Already have account? Login</a>
</div>

</body>
</html>
